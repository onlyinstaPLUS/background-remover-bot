services:
  - type: worker
    name: background-remover-bot
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python bot.py"
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: REMOVE_BG_API_KEY
        sync: false
    runtime: python-3.10.13
