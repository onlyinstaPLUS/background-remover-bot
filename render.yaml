services:
  - type: web
    name: background-remover-bot
    env: python
    runtime: python-3.10.13
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 1 --threads 4
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: REMOVE_BG_API_KEY
        sync: false
